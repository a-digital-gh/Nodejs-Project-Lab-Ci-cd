services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-nodejs-project-lab-ci-cd:local}
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
